version: '3.8'

services:
  # Database Service
  postgres_db:
    image: postgres:15-alpine
    container_name: express_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mihir
      POSTGRES_DB: conduit-development
    ports:
      - "3001:3001"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conduit-development"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build: ./backend
    container_name: express_backend_api
    restart: always
    ports:
      - "3002:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres_db
      - DB_USER=postgres
      - DB_PASSWORD=mihir
      - DB_NAME=conduit-development
      - DB_DIALECT=postgres
    depends_on:
      postgres_db:
        condition: service_healthy

  # Frontend Client Service
  frontend:
    build: ./frontend
    container_name: vite_frontend_client
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  pgdata:
